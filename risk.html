<div class="quiz">

<h2>📊 Risk Assessment</h2>

<p>Do you use the same password on multiple websites?</p>

    <option value="1">Yes</option>
</select>

<p>Do you enable Two-Factor Authentication?</p>
<select id="risk2">
    <option value="0">Yes</option>
    <option value="1">No</option>
</select>

<p>Do you click links from unknown emails?</p>
<select id="risk3">
    <option value="0">No</option>
    <option value="1">Yes</option>
</select>

<br><br>

<button onclick="checkRisk()">Check Risk</button>
